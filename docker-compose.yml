version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fth_postgres
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fth_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student -d fth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      network: host
    container_name: fth_app
    network_mode: "host"
    environment:
      - DB_HOST=127.0.0.1 
      - DB_PORT=5432
      - DB_USER=student
      - DB_PASSWORD=password
      - DB_NAME=fth_db
    volumes:
      - ./cert.pem:/app/cert.pem:ro
      - ./key.pem:/app/key.pem:ro
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data: